<!DOCTYPE html>
<p>Nasza strona korzysta z plików Cookie, korzystając z niej akceptujesz nasze warunki.</p>
<html>
<head>
    <meta charset="UTF-8">
    <title>Potwierdzenie e-mail</title>
</head>
<body>

<p id="tekst"></p>

<script>
let czyByl = localStorage.getItem("emailConfirmed");

if (czyByl === null) {
    document.getElementById("tekst").textContent = "Twój adres E-mail został właśnie potwierdzony!";
    localStorage.setItem("emailConfirmed", "true");
} else {
    document.getElementById("tekst").textContent = "Twój adres E-mail jest już potwierdzony!";
}
</script>

</body>
</html>
