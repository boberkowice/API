<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Potwierdzenie e-mail</title>
</head>
<body>

<p id="tekst"></p>

<script>
const poprawnyEmail = "Mjjr0002@gmail.com";

let email = prompt("Podaj adres E-mail");

if (email === poprawnyEmail) {

    let bylWczesniej = localStorage.getItem("emailConfirmed");

    if (bylWczesniej === null) {
        document.getElementById("tekst").textContent =
            "Twój adres E-mail został potwierdzony";

        localStorage.setItem("emailConfirmed", "true");

    } else {
        document.getElementById("tekst").textContent =
            "Twój adres E-mail jest już potwierdzony!";
    }

} else {
    document.getElementById("tekst").textContent = "Niepoprawny adres E-mail.";
}
</script>

</body>
</html>
